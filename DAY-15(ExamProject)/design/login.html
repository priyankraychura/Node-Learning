<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Hostel Management</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--primary-bg);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow-md);
        }

        .login-card h1 {
            text-align: center;
            color: var(--text-primary);
            margin-bottom: 25px;
            font-size: 1.8rem;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-container img { /* Placeholder for a logo */
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: var(--accent-primary); /* Temporary background */
            padding: 10px; /* If the logo needs padding */
            display: inline-block;
        }
        .form-group a {
            font-size: 0.9rem;
            color: var(--accent-primary);
            text-decoration: none;
            display: block;
            text-align: right;
            margin-top: 5px;
        }
        .form-group a:hover {
            text-decoration: underline;
        }
        .register-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.95rem;
        }
        .register-link a {
            color: var(--accent-secondary);
            font-weight: 500;
        }
        .register-link a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo-container">
                <!-- Placeholder for logo -->
                <!-- <img src="path/to/your/logo.svg" alt="Hostel Logo"> -->
                 <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-home" style="color: var(--primary-bg); background-color: var(--accent-primary); border-radius: 50%; padding:10px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
            </div>
            <h1>Admin Login</h1>
            <form>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="btn btn-primary btn-block mt-3">Login</button>
            </form>
            <p class="register-link">
                Don't have an account? <a href="register.html">Register here</a>
            </p>
        </div>
    </div>
</body>
</html>
